<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftType Pro</title>
    <style>
        :root { --bg: #1a1a1a; --main: #00d4ff; --text: #e0e0e0; --sub: #666; --error: #ff4b2b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { max-width: 850px; width: 90%; text-align: center; background: #252525; padding: 40px; border-radius: 20px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-ui { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .stat { color: var(--main); font-weight: bold; }
        select { background: #333; color: white; border: 1px solid var(--main); padding: 8px; border-radius: 5px; cursor: pointer; outline: none; }
        #words-container { font-size: 1.4rem; line-height: 2.2rem; text-align: left; margin-bottom: 30px; user-select: none; min-height: 120px; cursor: text; }
        .word { display: inline-block; margin-right: 12px; color: var(--sub); }
        .letter.correct { color: #fff; }
        .letter.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        .letter.current { border-left: 2px solid var(--main); animation: blink 0.8s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
        input { position: absolute; opacity: 0; pointer-events: none; }
        #results-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 26, 26, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; z-index: 100; }
        .result-score { font-size: 4rem; color: var(--main); margin: 0; font-weight: 800; }
        .restart-btn { background: var(--main); border: none; color: #000; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .restart-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div id="results-overlay">
        <h2 style="margin-bottom: 5px;">Test Complete!</h2>
        <p class="result-score"><span id="final-wpm">0</span></p>
        <p style="color:var(--main); margin-top:-10px; margin-bottom: 10px; font-weight:bold;">WORDS PER MINUTE</p>
        <p style="color:var(--sub); margin-bottom: 25px;">Mistakes: <span id="final-errors" style="color:var(--error)">0</span></p>
        <button class="restart-btn" onclick="resetTest()">Try Again</button>
    </div>

    <div class="header-ui">
        <div style="display: flex; gap: 20px;">
            <div>WPM: <span id="wpm" class="stat">0</span></div>
            <div>Time: <span id="timer" class="stat">30</span>s</div>
        </div>
        <select id="durationSelect" onfocus="isSelecting = true" onblur="isSelecting = false">
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="60">60s</option>
        </select>
    </div>

    <div id="words-container" onclick="focusInput()"></div>
    
    <input type="text" id="typing-input" autofocus autocomplete="off">
    <button class="restart-btn" onclick="resetTest()" style="background:#333; color:var(--text);">Restart</button>
</div>

<script>
    const textPool = "coding is a superpower that allows you to build anything you can imagine from simple websites to complex artificial intelligence systems the world is full of data waiting to be processed stay focused and keep your fingers moving across the home row of your keyboard";
    let wordsArray = [], currentWordIndex = 0, currentLetterIndex = 0, timer, maxTime, interval = null, isStarted = false, correctLetters = 0, totalErrors = 0;
    
    // The "isSelecting" flag prevents focus-stealing
    let isSelecting = false;

    const container = document.getElementById('words-container'), input = document.getElementById('typing-input'), timerDisplay = document.getElementById('timer'), wpmDisplay = document.getElementById('wpm'), durationSelect = document.getElementById('durationSelect'), overlay = document.getElementById('results-overlay');

    function initGame() {
        wordsArray = textPool.split(' ').sort(() => Math.random() - 0.5);
        maxTime = parseInt(durationSelect.value);
        timer = maxTime;
        timerDisplay.innerText = timer;
        overlay.style.display = 'none';
        input.disabled = false;
        renderWords();
    }

    function renderWords() {
        container.innerHTML = wordsArray.map((word, wIdx) => `
            <span class="word" id="word-${wIdx}">${word.split('').map((char, lIdx) => 
                `<span class="letter" id="word-${wIdx}-ltr-${lIdx}">${char}</span>`
            ).join('')}</span>
        `).join('');
        updateCursor();
    }

    function updateCursor() {
        document.querySelectorAll('.letter').forEach(el => el.classList.remove('current'));
        const current = document.getElementById(`word-${currentWordIndex}-ltr-${currentLetterIndex}`);
        if (current) current.classList.add('current');
    }

    input.addEventListener('input', (e) => {
        if (!isStarted) startTimer();
        const val = input.value, currentWord = wordsArray[currentWordIndex], targetChar = currentWord[currentLetterIndex], lastChar = val[val.length - 1];

        if (val.endsWith(' ')) {
            if (currentLetterIndex > 0) { currentWordIndex++; currentLetterIndex = 0; input.value = ''; }
        } else {
            const letterEl = document.getElementById(`word-${currentWordIndex}-ltr-${currentLetterIndex}`);
            if (letterEl) {
                if (lastChar === targetChar) { letterEl.classList.add('correct'); correctLetters++; }
                else { letterEl.classList.add('incorrect'); totalErrors++; }
                currentLetterIndex++;
            }
        }
        updateCursor();
    });

    function startTimer() {
        isStarted = true;
        interval = setInterval(() => {
            timer--;
            timerDisplay.innerText = timer;
            const elapsed = (maxTime - timer) / 60;
            wpmDisplay.innerText = Math.round((correctLetters / 5) / elapsed) || 0;
            if (timer <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        clearInterval(interval);
        input.disabled = true;
        document.getElementById('final-wpm').innerText = wpmDisplay.innerText;
        document.getElementById('final-errors').innerText = totalErrors;
        overlay.style.display = 'flex';
    }

    function resetTest() {
        clearInterval(interval);
        isStarted = false; currentWordIndex = 0; currentLetterIndex = 0; correctLetters = 0; totalErrors = 0;
        input.value = ''; wpmDisplay.innerText = "0";
        initGame();
        // Only focus if we aren't currently clicking the dropdown
        if(!isSelecting) setTimeout(() => input.focus(), 50);
    }

    function focusInput() { 
        if(overlay.style.display !== 'flex' && !isSelecting) {
            input.focus(); 
        }
    }

    durationSelect.addEventListener('change', () => {
        isSelecting = false; // Dropdown is done
        resetTest();
    });
    
    // Also, if the user clicks anywhere on the body, try to focus (unless they are selecting)
    document.body.addEventListener('click', (e) => {
        if (e.target.tagName !== 'SELECT') {
            focusInput();
        }
    });

    initGame();
</script>
</body>
</html>
